<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>North Landing Disc Return</title>
    <script>
      // Redirect deep links to index.html for SPA routing on GitHub Pages.
      // Encodes the path as a query param: /admin/discs becomes /?/admin/discs
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
