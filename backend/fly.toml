# fly.toml app configuration file generated for northlandingdiscreturn-api on 2026-04-21T17:59:17-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'northlandingdiscreturn-api'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'uv run alembic upgrade head'

[env]
  FRONTEND_URL = 'https://discreturn.nl'
  SUPABASE_BUCKET = 'disc-photos'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
