[tests]
min_version = 'v0.16.0'
mount = false

[tests.steps]
sync = "uv sync --extra dev"
tests = "uv run pytest {posargs}"

[tests.environment]
SECRET_KEY = "test-secret-key-for-tests-only"
API_KEY_HMAC_SECRET = "test-api-key-hmac-secret"
GOOGLE_CLIENT_ID = "test-client-id"
GOOGLE_CLIENT_SECRET = "test-client-secret"
SURGE_API_KEY = "test-key"
SURGE_ACCOUNT_ID = "acct_test"
SURGE_FROM_NUMBER = "+15550000000"
SURGE_WEBHOOK_SIGNING_SECRET = "test-secret"
SURGE_API_URL = "https://api.surge.app"
SUPABASE_URL = "https://test.supabase.co"
SUPABASE_SERVICE_KEY = "test-service-key"

[services.database]
image = "docker.io/postgres:16"

[services.database.ports]
"5432/tcp" = ""

[services.database.environment]
POSTGRES_USER = "northlanding"
POSTGRES_PASSWORD = "secret"
POSTGRES_DB = "northlanding_test"

[services.database.export]
DATABASE_URL = "postgresql+asyncpg://{POSTGRES_USER}:{POSTGRES_PASSWORD}@{HOST}:{PORT;5432/tcp}/{POSTGRES_DB}"
